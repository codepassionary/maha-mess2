<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Mess Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
            --muted: #64748b; --primary: #2563eb; --border: #e2e8f0;
            --green: #10b981; --orange: #f59e0b; --red: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .dark {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --muted: #94a3b8; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; transition: 0.3s; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -1px; color: var(--primary); }
        .header-btns { display: flex; gap: 10px; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 10px; cursor: pointer; font-size: 18px; box-shadow: var(--shadow); }

        .status-bar { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
        #saveIndicator { color: var(--green); opacity: 0; transition: 0.3s; }

        /* Quick Log UI with Sections */
        .action-card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
        .meal-group-label { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin: 15px 0 8px 0; display: flex; align-items: center; gap: 8px; }
        .meal-group-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .meal-group-label:first-child { margin-top: 0; }

        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .toggle-btn { 
            padding: 14px 10px; border-radius: 14px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer;
            font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toggle-btn.active { border-color: var(--primary); background: rgba(37, 99, 235, 0.1); color: var(--primary); border-width: 2px; }
        .toggle-btn span { font-size: 10px; opacity: 0.7; }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-item { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .stat-val { font-size: 20px; font-weight: 800; display: block; margin-top: 4px; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }

        /* Progress Bar */
        .progress-box { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .progress-container { height: 10px; background: var(--border); border-radius: 20px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.6s; }

        /* History & Archive List */
        .section-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .table-wrap { display: none; background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td, th { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); }
        
        .archive-item { background: var(--card); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .archive-info b { display: block; font-size: 14px; }
        .archive-info small { color: var(--muted); font-size: 11px; }

        #settingsModal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Nexus</h1>
        <div class="header-btns">
            <button class="icon-btn" onclick="exportData()">💾</button>
            <button class="icon-btn" onclick="document.getElementById('settingsModal').style.display='flex'">⚙️</button>
            <button class="icon-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="status-bar">
        <span>Editing: <b id="displayDate"></b></span>
        <span id="saveIndicator">✓ Saved</span>
    </div>

    <div class="action-card">
        <div class="meal-group-label">Lunch</div>
        <div class="grid-buttons">
            <button class="toggle-btn" id="btnLA" onclick="toggleField('LA')">🍱 <span id="labelLA">Mess A</span></button>
            <button class="toggle-btn" id="btnLB" onclick="toggleField('LB')">🍲 <span id="labelLB">Mess B</span></button>
        </div>

        <div class="meal-group-label">Dinner</div>
        <div class="grid-buttons">
            <button class="toggle-btn" id="btnDA" onclick="toggleField('DA')">🍛 <span id="labelDA">Mess A</span></button>
            <button class="toggle-btn" id="btnDB" onclick="toggleField('DB')">🥘 <span id="labelDB">Mess B</span></button>
        </div>

        <div class="meal-group-label">Others</div>
        <div style="display: flex; gap: 12px;">
            <button class="toggle-btn" id="btnW" style="flex: 1;" onclick="toggleField('W')">💧 <span>Water</span></button>
            <div class="toggle-btn" style="flex: 1; cursor: default;">
                <span style="font-size: 10px; opacity:1">Extra Meal</span>
                <input type="number" id="extraInput" value="0" min="0" onchange="updateExtra(this.value)" style="width: 50px; border:none; background:transparent; font-size:18px; font-weight:800; color:var(--primary); text-align:center;">
            </div>
        </div>
    </div>

    <div class="progress-box">
        <div style="display:flex; justify-content: space-between; align-items: flex-end;">
            <span class="stat-label">Budget Usage</span>
            <b id="budgetPct">0%</b>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="stats">
        <div class="stat-item"><span class="stat-label">Total Bill</span><span class="stat-val" id="statTotal">₹0</span></div>
        <div class="stat-item"><span class="stat-label">Meals</span><span class="stat-val" id="statMeals">0</span></div>
    </div>

    <button class="section-btn" onclick="toggleEl('historyTable')">📅 Current Month Ledger</button>
    <div id="historyTable" class="table-wrap">
        <table>
            <thead><tr><th>Day</th><th>L</th><th>D</th><th>W</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <button class="section-btn" style="background:var(--muted)" onclick="toggleEl('archiveBox')">📚 History Archives</button>
    <div id="archiveBox" style="display:none"></div>
</div>

<div id="settingsModal" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0">Settings</h3>
        <label style="font-size:11px; font-weight:bold; color:var(--muted)">MESS A</label>
        <input type="text" id="setNameA" onchange="updateSet()" style="width:100%; padding:10px; margin:5px 0 15px 0; border-radius:8px; border:1px solid var(--border);">
        <label style="font-size:11px; font-weight:bold; color:var(--muted)">MESS B</label>
        <input type="text" id="setNameB" onchange="updateSet()" style="width:100%; padding:10px; margin:5px 0 15px 0; border-radius:8px; border:1px solid var(--border);">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label style="font-size:11px;">Meal ₹</label><input type="number" id="setPriceM" onchange="updateSet()" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);"></div>
            <div><label style="font-size:11px;">Water ₹</label><input type="number" id="setPriceW" onchange="updateSet()" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);"></div>
        </div>
        <button class="section-btn" style="margin-top:20px;" onclick="document.getElementById('settingsModal').style.display='none'">Close</button>
    </div>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('m-conf')) || { nA: "Hostel", nB: "Outside", pM: 60, pW: 20, bud: 5000 };
    let viewDate = new Date();
    const currentKey = `m-${viewDate.getFullYear()}-${viewDate.getMonth()}`;
    let data = JSON.parse(localStorage.getItem(currentKey)) || {};

    // --- ARCHIVE ENGINE ---
    function runArchive() {
        const lastKey = localStorage.getItem('last-key');
        if (lastKey && lastKey !== currentKey) {
            const oldData = JSON.parse(localStorage.getItem(lastKey)) || {};
            let meals = 0, water = 0, extras = 0;
            Object.values(oldData).forEach(v => {
                if(v.LA || v.LB) meals++; if(v.DA || v.DB) meals++;
                if(v.W) water++; extras += (v.EX || 0);
            });
            const total = (meals + extras) * config.pM + (water * config.pW);
            
            let archives = JSON.parse(localStorage.getItem('m-archives')) || [];
            archives.push({ date: lastKey.replace('m-', ''), bill: total, meals: meals + extras });
            localStorage.setItem('m-archives', JSON.stringify(archives));
        }
        localStorage.setItem('last-key', currentKey);
    }

    function applyUI() {
        document.getElementById('displayDate').innerText = viewDate.toDateString();
        document.getElementById('setNameA').value = config.nA;
        document.getElementById('setNameB').value = config.nB;
        document.getElementById('setPriceM').value = config.pM;
        document.getElementById('setPriceW').value = config.pW;
        
        document.getElementById('labelLA').innerText = config.nA;
        document.getElementById('labelDA').innerText = config.nA;
        document.getElementById('labelLB').innerText = config.nB;
        document.getElementById('labelDB').innerText = config.nB;
        
        const d = data[viewDate.getDate()] || {LA:0, LB:0, DA:0, DB:0, W:0, EX:0};
        document.getElementById('btnLA').classList.toggle('active', !!d.LA);
        document.getElementById('btnLB').classList.toggle('active', !!d.LB);
        document.getElementById('btnDA').classList.toggle('active', !!d.DA);
        document.getElementById('btnDB').classList.toggle('active', !!d.DB);
        document.getElementById('btnW').classList.toggle('active', !!d.W);
        document.getElementById('extraInput').value = d.EX;

        renderStats();
        renderTable();
        renderArchives();
    }

    function toggleField(field) {
        const d = viewDate.getDate();
        if(!data[d]) data[d] = {LA:0, LB:0, DA:0, DB:0, W:0, EX:0};
        if(field === 'LA') { data[d].LA = !data[d].LA; data[d].LB = 0; }
        if(field === 'LB') { data[d].LB = !data[d].LB; data[d].LA = 0; }
        if(field === 'DA') { data[d].DA = !data[d].DA; data[d].DB = 0; }
        if(field === 'DB') { data[d].DB = !data[d].DB; data[d].DA = 0; }
        if(field === 'W')  { data[d].W = !data[d].W; }
        save();
    }

    function updateExtra(v) {
        const d = viewDate.getDate();
        if(!data[d]) data[d] = {LA:0, LB:0, DA:0, DB:0, W:0, EX:0};
        data[d].EX = parseInt(v) || 0;
        save();
    }

    function save() {
        localStorage.setItem(currentKey, JSON.stringify(data));
        const s = document.getElementById('saveIndicator');
        s.style.opacity = 1; setTimeout(() => s.style.opacity = 0, 1000);
        applyUI();
    }

    function renderStats() {
        let meals = 0, water = 0, extras = 0;
        Object.values(data).forEach(v => {
            if(v.LA || v.LB) meals++; if(v.DA || v.DB) meals++;
            if(v.W) water++; extras += (v.EX || 0);
        });
        const cost = (meals + extras) * config.pM + (water * config.pW);
        document.getElementById('statTotal').innerText = `₹${cost}`;
        document.getElementById('statMeals').innerText = meals + extras;
        const pct = Math.min((cost / config.bud) * 100, 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('budgetPct').innerText = Math.round(pct) + '%';
    }

    function renderTable() {
        const tbody = document.getElementById('tbody'); tbody.innerHTML = '';
        const days = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const r = data[i] || {LA:0, LB:0, DA:0, DB:0, W:0};
            const tr = document.createElement('tr');
            if(i === viewDate.getDate()) tr.style.background = 'rgba(37,99,235,0.1)';
            tr.onclick = () => { viewDate.setDate(i); applyUI(); window.scrollTo(0,0); };
            tr.innerHTML = `<td>${i}</td><td>${r.LA?'A':(r.LB?'B':'-')}</td><td>${r.DA?'A':(r.DB?'B':'-')}</td><td>${r.W?'💧':'-'}</td>`;
            tbody.appendChild(tr);
        }
    }

    function renderArchives() {
        const box = document.getElementById('archiveBox');
        const archives = JSON.parse(localStorage.getItem('m-archives')) || [];
        box.innerHTML = archives.map(a => `<div class="archive-item">
            <div class="archive-info"><b>Month: ${a.date}</b><small>${a.meals} Meals logged</small></div>
            <b style="color:var(--primary)">₹${a.bill}</b>
        </div>`).join('') || '<p style="text-align:center; color:var(--muted)">No archives yet</p>';
    }

    function updateSet() {
        config.nA = document.getElementById('setNameA').value;
        config.nB = document.getElementById('setNameB').value;
        config.pM = parseInt(document.getElementById('setPriceM').value) || 0;
        config.pW = parseInt(document.getElementById('setPriceW').value) || 0;
        localStorage.setItem('m-conf', JSON.stringify(config));
        applyUI();
    }

    function toggleEl(id) { 
        const e = document.getElementById(id); 
        e.style.display = e.style.display === 'block' ? 'none' : 'block'; 
    }

    function toggleTheme() { document.body.classList.toggle('dark'); }
    
    runArchive();
    applyUI();
</script>
</body>
</html>
